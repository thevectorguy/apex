</div>

<div class="z-10 mb-8">
<div class="glass-panel px-4 py-1.5 rounded-full border border-outline-variant/10 flex items-center gap-2">

<span class="font-headline text-[10px] tracking-[0.2em] uppercase font-bold text-on-surface-variant">Live Scenario</span>

</div>

<div class="relative group">

</div>

<div class="waveform-bar w-1 bg-primary/40 rounded-full h-4"></div>
<div class="waveform-bar w-1 bg-primary/60 rounded-full h-8"></div>
<div class="waveform-bar w-1 bg-primary rounded-full h-12"></div>
<div class="waveform-bar w-1 bg-primary/80 rounded-full h-6"></div>

<div class="waveform-bar w-1 bg-primary/60 rounded-full h-9"></div>
<div class="waveform-bar w-1 bg-primary rounded-full h-4"></div>

<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>

<button class="w-14 h-14 rounded-2xl glass-panel border border-outline-variant/10 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors group">
